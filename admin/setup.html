<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS First-Time Setup</title>
  <link rel="stylesheet" href="css/setup.css" />
</head>
<body>
  <div class="setup-shell">
    <div class="setup-card" role="main">
      <div class="setup-branding">
        <div class="brand-mark">NA</div>
        <div>
          <p class="brand-label">Naziera CMS</p>
          <p class="brand-subtitle">Create your first administrator</p>
        </div>
      </div>

      <div class="notification notification-hidden" id="notification" role="status" aria-live="polite"></div>

      <form class="setup-form" id="setupForm" novalidate>
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" type="text" placeholder="Enter your full name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <div class="password-field">
          <input id="password" name="password" type="password" placeholder="Create a strong password" required />
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">Show</button>
        </div>

        <label for="confirmPassword">Confirm Password</label>
        <div class="password-field">
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter your password" required />
          <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Show password">Show</button>
        </div>

        <button class="setup-button" id="setupButton" type="submit">
          <span class="button-text">Create Admin Account</span>
          <span class="spinner" id="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <p class="helper-text">This setup can only run once. If an administrator already exists, the request will be rejected.</p>
    </div>
  </div>

  <script src="js/setup.js"></script>
</body>
</html>
