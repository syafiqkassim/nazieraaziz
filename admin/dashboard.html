<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:40px auto;
    padding:20px;
}
label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}
input,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    box-sizing:border-box;
}
textarea{
    height:120px;
}
button{
    margin-top:20px;
    padding:12px 20px;
    cursor:pointer;
}
#status{
    margin-top:15px;
    color:green;
}
</style>
</head>
<body>

<h1>Website CMS</h1>

<label>Name</label>
<input id="name">

<label>Title</label>
<input id="title">

<label>Description</label>
<textarea id="description"></textarea>

<button onclick="save()">Save</button>

<p id="status"></p>

<script>
async function load(){

const res=await fetch('/api/load');
const data=await res.json();

document.getElementById('name').value=data.hero.name;
document.getElementById('title').value=data.hero.title;
document.getElementById('description').value=data.hero.description;

}

async function save(){

const hero={
name:document.getElementById('name').value,
title:document.getElementById('title').value,
description:document.getElementById('description').value
};

const res=await fetch('/api/save',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({hero})
});

const result=await res.json();

document.getElementById('status').innerText=result.message || "Saved";

}

load();
</script>

</body>
</html>
