<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Admin Login</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card" role="main">
      <div class="login-branding">
        <div class="brand-mark">NA</div>
        <div>
          <p class="brand-label">Naziera CMS</p>
          <p class="brand-subtitle">Secure admin access</p>
        </div>
      </div>

      <div class="notification notification-hidden" id="notification" role="status" aria-live="polite"></div>

      <form class="login-form" id="loginForm" autocomplete="off">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <div class="password-field">
          <input id="password" name="password" type="password" placeholder="Enter your password" required />
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">Show</button>
        </div>

        <div class="form-footer">
          <label class="checkbox-label">
            <input id="remember" name="remember" type="checkbox" />
            Remember Me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button class="login-button" id="loginButton" type="submit">
          <span class="button-text">Login</span>
          <span class="spinner" id="spinner" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
